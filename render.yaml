services:
  - type: web
    name: yt-notes-line-bot
    runtime: python
    plan: free
    buildCommand: pip install -r video_text/line_bot/requirements.txt
    startCommand: gunicorn --chdir video_text/line_bot --timeout 120 app:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: REDIS_URL
        sync: false

# Render 沒有免費的 cron 服務方案，改用外部免費排程服務（例如 cron-job.org）
# 定時打 POST https://<你的服務網址>/check_all?secret=<CRON_SECRET> 來觸發每日檢查。
#
# REDIS_URL 是監控清單的永久儲存（Upstash Redis 免費方案，不會過期，也不受
# Render 免費方案重新部署/休眠重啟清空本機磁碟的影響）。去 upstash.com 建立一個
# 免費 Redis database，把它給的連線字串（格式 rediss://default:<password>@<host>:<port>）
# 設成這個環境變數。沒有設定的話會自動退回本機 JSON 檔，但會在重新部署後消失。
